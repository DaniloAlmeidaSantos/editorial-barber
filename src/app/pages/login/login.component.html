<body class="bg-background text-on-surface font-body min-h-screen selection:bg-primary selection:text-on-primary">

  <!-- Hero Background Layer -->
  <div class="fixed inset-0 z-0 overflow-hidden">
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/60 to-transparent z-10"></div>
    <img
      alt="Interior of a high-end modern barbershop with leather chairs"
      class="w-full h-full object-cover grayscale opacity-40 scale-105"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCLo6eKgzwj18NEtO8G6hM5UED7w9ujpQ_b5yf4YxgjXegLO1WnXj2Nc-mtKVBZ-nOJrLwHELlctssf_k501yst2PSyxUpEMuUymQcIZJlM3RCkQ6NRIMpxN1MXv6KjXsTu7TFX0NXIQ4FjPNokkTwzmplZ-qydzjE6DH0eY5sq5RMVjnuYVpEH2j--lAzkD5ceMmF10xgBw1tLXRoGFGHSh7BW5805dYDpZyKQ3sur4Vw4wt-woSsZB8hFCia1wCcH0Z9Ia3H5w"
    />
  </div>

  <!-- Main Content Shell -->
  <main class="relative z-20 flex min-h-screen items-center justify-center px-6 py-12">

    <!-- Login Container -->
    <div class="w-full max-w-[440px] animate-fade-in">

      <!-- Branding Header -->
      <div class="text-center mb-10">
        <h1 class="font-headline text-2xl font-bold tracking-tighter text-on-surface uppercase mb-2">
          The Editorial Barber
        </h1>
        <p class="font-label text-xs uppercase tracking-[0.2em] text-secondary/70">
          Portal do Cliente ⋅ Acesso Exclusivo
        </p>
      </div>

      <!-- Login Card -->
      <div class="glass-card rounded-xl p-8 md:p-10 shadow-[0_20px_40px_rgba(0,0,0,0.4),0_0_10px_rgba(217,119,7,0.05)] border border-outline-variant/15">

        <h2 class="font-headline text-xl font-semibold text-on-surface mb-8 text-center">Bem-vindo de volta</h2>

        <!-- Auth Form -->
        <form class="space-y-6" (ngSubmit)="onSubmit()" #loginForm="ngForm">

          <!-- Email Field -->
          <div class="space-y-2">
            <label class="block font-label text-[10px] uppercase tracking-widest text-secondary ml-1" for="email">
              E-mail
            </label>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary transition-colors">
                mail
              </span>
              <input
                class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 text-sm text-on-surface placeholder:text-outline/40 focus:ring-0 focus:outline-none transition-all border-b-2 border-outline/10 focus:border-primary"
                id="email"
                name="email"
                type="email"
                placeholder="seuemail@exemplo.com"
                required
                [(ngModel)]="email"
              />
            </div>
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center ml-1">
              <label class="block font-label text-[10px] uppercase tracking-widest text-secondary" for="password">
                Senha
              </label>
              <a class="font-label text-[10px] uppercase tracking-widest text-primary hover:text-on-surface transition-colors" href="#">
                Esqueceu?
              </a>
            </div>
            <div class="relative group">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary transition-colors">
                lock
              </span>
              <input
                class="w-full bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-12 text-sm text-on-surface placeholder:text-outline/40 focus:ring-0 focus:outline-none transition-all border-b-2 border-outline/10 focus:border-primary"
                id="password"
                name="password"
                [type]="showPassword() ? 'text' : 'password'"
                placeholder="••••••••"
                required
                [(ngModel)]="password"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-outline/50 hover:text-primary transition-colors"
                [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
              >
                <span class="material-symbols-outlined text-[20px]">
                  {{ showPassword() ? 'visibility_off' : 'visibility' }}
                </span>
              </button>
            </div>
          </div>

          <!-- Error Message -->
          @if (errorMessage()) {
            <div class="rounded-xl bg-error-container/30 border border-error/20 px-4 py-3">
              <p class="font-label text-xs text-error text-center">{{ errorMessage() }}</p>
            </div>
          }

          <!-- CTA Button -->
          <button
            class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary-container font-headline font-bold py-4 rounded-xl uppercase tracking-tighter hover:opacity-90 active:scale-[0.98] transition-all shadow-lg disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
            type="submit"
            [disabled]="isLoading() || !email || !password"
          >
            @if (isLoading()) {
              <span class="inline-block w-4 h-4 border-2 border-on-primary-container/30 border-t-on-primary-container rounded-full animate-spin"></span>
            }
            ENTRAR COMO CLIENTE
          </button>

        </form>

        <!-- Divider -->
        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-outline-variant/15"></div>
          </div>
          <div class="relative flex justify-center text-[10px] uppercase tracking-widest font-label">
            <span class="px-3 bg-[#1C1B1B] text-secondary/60">Ou continue com</span>
          </div>
        </div>

        <!-- Social Logins -->
        <div class="grid grid-cols-2 gap-4">
          <button
            type="button"
            (click)="onGoogleLogin()"
            class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-surface-container-high transition-colors font-label text-xs uppercase tracking-wider text-on-surface active:scale-95"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 3.16-4.53z" fill="currentColor"/>
            </svg>
            Google
          </button>
          <button
            type="button"
            (click)="onAppleLogin()"
            class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/15 bg-surface-container-low hover:bg-surface-container-high transition-colors font-label text-xs uppercase tracking-wider text-on-surface active:scale-95"
          >
            <svg class="w-4 h-4" viewBox="0 0 24 24">
              <path d="M17.05 20.28c-.96.95-2.04 1.72-3.13 1.72-1.13 0-1.56-.69-2.91-.69-1.38 0-1.85.67-2.91.67-1.07 0-2.18-.79-3.14-1.74C3 18.2 1.63 15.17 1.63 12.11c0-3.13 2.01-4.79 3.96-4.79 1.05 0 2.03.73 2.66.73.61 0 1.57-.75 2.7-.75 1.02 0 3.86.37 5.39 2.62-1.3 1.13-2.14 2.85-2.14 4.78 0 2.14 1.03 3.88 2.85 5.58zM11.96 6.94c0-2.12 1.74-3.84 3.85-3.84.21 0 .44.02.63.05-.18 2.37-1.87 4.19-3.88 4.19-.24 0-.44-.02-.6-.05-.01-.12-.01-.24-.01-.35z" fill="currentColor"/>
            </svg>
            Apple
          </button>
        </div>

        <!-- Footer Links -->
        <div class="mt-10 flex flex-col items-center gap-4">
          <p class="font-body text-xs text-secondary/60">
            Novo por aqui?
            <a class="text-primary font-semibold ml-1 hover:underline underline-offset-4 transition-all" href="/register">
              Criar Conta
            </a>
          </p>
          <a
            class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-outline-variant/10 text-outline-variant font-label text-[10px] uppercase tracking-widest hover:bg-outline-variant/20 hover:text-on-surface transition-all"
            href="/staff/login"
          >
            <span class="material-symbols-outlined text-sm">badge</span>
            Login do Barbeiro
          </a>
        </div>

      </div>

      <!-- Accessibility Footer -->
      <footer class="mt-8 text-center">
        <p class="font-label text-[10px] uppercase tracking-[0.3em] text-secondary/40">
          © 2024 The Editorial Barber. Precisão em cada detalhe.
        </p>
      </footer>

    </div>
  </main>

  <!-- Decorative Blade Element -->
  <div class="fixed left-0 top-1/4 h-32 w-1 bg-primary z-30 opacity-60"></div>

</body>
